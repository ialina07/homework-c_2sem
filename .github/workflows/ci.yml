name: CI

on: [push, pull_request]

jobs:
  check-style:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format-14

      - name: Check code format
        run: |
          FILES=$(find . -name '*.c' -o -name '*.h')
          if [ -n "$FILES" ]; then
            echo "$FILES" | xargs clang-format-14 --dry-run --Werror
          else
            echo "No .c or .h files found - skipping"
          fi

  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install clang-tidy
        run: sudo apt-get update && sudo apt-get install -y clang-tidy-14

      - name: Run clang-tidy
        run: |
          FILES=$(find . -name '*.c')
          if [ -n "$FILES" ]; then
            echo "$FILES" | xargs clang-tidy-14
          else
            echo "No .c files found - skipping"
          fi

  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install CMake
        run: sudo apt-get update && sudo apt-get install -y cmake

      - name: Build and test
        run: |
          if [ -d "csv-printer" ]; then
            cd csv-printer
            mkdir -p build
            cd build
            cmake ..
            make
            if [ -f tests ]; then
              ./tests
            fi
          else
            echo "No csv-printer directory found - skipping"
          fi
