name: CI

on: [push, pull_request]

jobs:
  check-style:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format-14

      - name: Check code format
        run: |
          find . -name '*.c' -o -name '*.h' | xargs clang-format-14 --dry-run --Werror

  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install clang-tidy
        run: sudo apt-get update && sudo apt-get install -y clang-tidy-14

      - name: Run clang-tidy
        run: |
          find . -name '*.c' | while read file; do
            dir=$(dirname "$file")
            parent=$(dirname "$dir")
            
            if [ -d "$parent/include" ]; then
              clang-tidy-14 "$file" -- -I"$parent/include" -I"$dir" || true
            elif [ -d "$dir/include" ]; then
              clang-tidy-14 "$file" -- -I"$dir/include" -I"$dir" || true
            else
              clang-tidy-14 "$file" -- -I"$dir" || true
            fi
          done

  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install CMake
        run: sudo apt-get update && sudo apt-get install -y cmake

      - name: Build and test
        run: |
          for dir in */; do
            if [ -f "$dir/CMakeLists.txt" ]; then
              echo "========================================="
              echo "Building: $dir"
              echo "========================================="
              cd "$dir"
              mkdir -p build
              cd build
              cmake ..
              make
              
              # Run tests if they exist
              if [ -f "./tests" ]; then
                ./tests
              fi
              
              cd ../..
            fi
          done