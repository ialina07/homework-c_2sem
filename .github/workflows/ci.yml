name: CI

on: [push, pull_request]

jobs:
  check-style:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install clang-format
        run: sudo apt-get update && sudo apt-get install -y clang-format-14

      - name: Check code format
        run: |
          find . -name '*.c' -o -name '*.h' | xargs clang-format-14 --dry-run --Werror

  static-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install clang-tidy
        run: sudo apt-get update && sudo apt-get install -y clang-tidy-14

      - name: Run clang-tidy
        run: |
          find . -name '*.c' | xargs clang-tidy-14

  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install CMake
        run: sudo apt-get update && sudo apt-get install -y cmake

      - name: Build and test
        run: |
          mkdir -p build
          cd build
          cmake ..
          make
          ctest